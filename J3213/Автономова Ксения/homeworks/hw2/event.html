<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мероприятие - Билеты Петербурга</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="tp.loadEvent(); tp.hideOrganizerLinks(); tp.hideUserLinks()">
  <a href="#maincontent" class="skip-link">Перейти к основному содержимому</a>
  <div class="ticket-platform">
    <header class="ticket-platform__header navbar navbar-expand-lg navbar-dark" role="banner">
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">Билеты Петербурга</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Переключить навигацию"
        >
          <span class="navbar-toggler-icon" aria-hidden="true"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav" role="navigation">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Мои билеты</a></li>
            <li class="nav-item"><a class="nav-link" href="organizer.html">Организатор</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Выйти</a></li>
          </ul>
        </div>
      </div>
    </header>
    <main id="maincontent" class="container my-4 flex-grow-1" role="main">
      <div class="row">
        <div class="col-md-4">
          <img id="eventImage" class="img-fluid rounded" alt="Афиша" />
        </div>
        <div class="col-md-8">
          <h2 id="eventTitle"></h2>
          <p><strong>Тип:</strong> <span id="eventType"></span></p>
          <p><strong>Дата:</strong> <span id="eventDate"></span></p>
          <p><strong>Место:</strong> <span id="eventLocation"></span></p>
          <p><strong>Цена:</strong> <span id="eventPrice"></span></p>
          <p id="eventDesc" class="ticket-platform__text-wrap"></p>
          <div class="mt-3">
            <button id="buyButton" class="btn btn-success" onclick="tp.buyTicket()">Купить билет</button>
          </div>
          <div id="purchaseAlert" class="alert alert-success mt-3 d-none" role="alert"></div>
        </div>
      </div>
        <div id="seatSection" class="mt-4">
        <h3 id="seatSectionHeading">Схема зала</h3>
        <div id="seatMap" class="ticket-platform__hall" aria-label="Схема зала"></div>
        <div id="selectedSeatInfo" class="mt-2 text-center"></div>
      </div>

      <div id="reviewsSection" class="mt-4">
        <h3>Отзывы</h3>
        <div id="reviewList"></div>
        <form id="reviewForm" class="mt-3">
          <div class="mb-3">
            <label for="reviewAuthor" class="form-label">Ваше имя</label>
            <input type="text" id="reviewAuthor" class="form-control" placeholder="Имя" />
          </div>
          <div class="mb-3">
            <label for="reviewText" class="form-label">Ваш отзыв</label>
            <textarea id="reviewText" class="form-control" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Отправить отзыв</button>
        </form>
      </div>
    </main>

  </div>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"
  ></script>
  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/event-page.js"></script>
</body>
</html>
