<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поиск мероприятий - Билеты Петербурга</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/light.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="css/dark.css" media="(prefers-color-scheme: dark)">
</head>
<body onload="tp.updateLogoLink(); tp.applyFilters(); tp.hideOrganizerLinks(); tp.hideUserLinks()">
  <a href="#maincontent" class="skip-link">Перейти к основному содержимому</a>
  <div class="ticket-platform">
    <header class="ticket-platform__header navbar navbar-expand-lg navbar-dark" role="banner">
      <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html" id="logoLink">Билеты Петербурга</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Переключить навигацию"
      >
        
        <svg class="icon" aria-hidden="true"><use xlink:href="icons/sprite.svg#bars"></use></svg>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav" role="navigation">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Мои билеты</a></li>
            <li class="nav-item"><a class="nav-link" href="organizer.html">Организатор</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Выйти</a></li>
        </ul>
      </div>
    </div>
    </header>
    <main id="maincontent" class="container mt-4 flex-grow-1" role="main">
      <h2 class="mb-3">Найти мероприятие</h2>
      <form class="row g-3 mb-4" id="filterForm">
        <div class="col-md-3">
          <label for="filterType" class="form-label">
            <svg class="icon me-1" aria-hidden="true"><use xlink:href="icons/sprite.svg#activity"></use></svg>Тип
          </label>
          <select id="filterType" class="form-select" onchange="tp.applyFilters()">
            <option value="">Все</option>
            <option value="Концерт">Концерт</option>
            <option value="Экскурсия">Экскурсия</option>
            <option value="Другое">Другое</option>
          </select>
        </div>
        <div class="col-md-3">
          <label for="filterDate" class="form-label">
            <svg class="icon me-1" aria-hidden="true"><use xlink:href="icons/sprite.svg#calendar"></use></svg>С даты
          </label>
          <input type="date" id="filterDate" class="form-control" onchange="tp.applyFilters()" />
        </div>
        <div class="col-md-3">
          <label for="filterLocation" class="form-label">
            <svg class="icon me-1" aria-hidden="true"><use xlink:href="icons/sprite.svg#location"></use></svg>Место
          </label>
          <input
            type="text"
            id="filterLocation"
            class="form-control"
            placeholder="Город или место"
            oninput="tp.applyFilters()"
          />
        </div>
      </form>
      <div class="row" id="searchResults"></div>
    </main>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/search-page.js"></script>
</body>
</html>
