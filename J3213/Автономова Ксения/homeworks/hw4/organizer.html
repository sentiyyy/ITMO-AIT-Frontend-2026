<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель организатора - Билеты Петербурга</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/light.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="css/dark.css" media="(prefers-color-scheme: dark)">
</head>
<body onload="tp.updateLogoLink(); tp.requireOrganizer(); tp.loadOrganizerDashboard(); tp.hideOrganizerLinks(); tp.hideUserLinks()">
  <a href="#maincontent" class="skip-link">Перейти к основному содержимому</a>
  <div class="ticket-platform">
    <header class="ticket-platform__header navbar navbar-expand-lg navbar-dark" role="banner">
      <div class="container-fluid">
        <a class="navbar-brand" href="organizer.html" id="logoLink">Билеты Петербурга</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Переключить навигацию"
        >
        
        <svg class="icon" aria-hidden="true"><use xlink:href="icons/sprite.svg#bars"></use></svg>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav" role="navigation">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="organizer.html">Организатор</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Выйти</a></li>
          </ul>
        </div>
      </div>
    </header>
    <main id="maincontent" class="container mt-4 flex-grow-1" role="main">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Мои мероприятия</h2>

        <button class="btn btn-primary" type="button" onclick="tp.toggleCreateForm()">Создать мероприятие</button>
      </div>

      <ul class="ticket-platform__list" id="orgEventList"></ul>

      <div id="createEventFormContainer" style="display:none" class="mt-4">
        <h4>Новое мероприятие</h4>
        <form id="createEventForm" onsubmit="tp.createEventFromForm(event)">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="newEventTitle" class="form-label">Название</label>
              <input type="text" id="newEventTitle" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label for="newEventType" class="form-label">Тип</label>
              <select id="newEventType" class="form-select" required>
                <option value="Концерт">Концерт</option>
                <option value="Экскурсия">Экскурсия</option>
                <option value="Другое">Другое</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="newEventDate" class="form-label">Дата</label>

              <input type="text" id="newEventDate" class="form-control" placeholder="ГГГГ-ММ-ДД" required />
            </div>
            <div class="col-md-4">
              <label for="newEventLocation" class="form-label">Место</label>
              <input type="text" id="newEventLocation" class="form-control" placeholder="Город" required />
            </div>
            <div class="col-md-4">
              <label for="newEventPrice" class="form-label">Цена (₽)</label>
              <input type="number" id="newEventPrice" class="form-control" min="0" step="1" required />
            </div>
            <div class="col-12">
              <label for="newEventDesc" class="form-label">Описание</label>
              <textarea id="newEventDesc" class="form-control" rows="3" required></textarea>
            </div>
            <div class="col-12">
              <label for="newEventPoster" class="form-label">Ссылка на афишу (изображение в jpg)</label>
              <input type="url" id="newEventPoster" class="form-control" placeholder="" />
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <button type="button" class="btn btn-secondary" onclick="tp.toggleCreateForm()">Отмена</button>
          </div>
        </form>
      </div>
    </main>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script src="js/api.js"></script>
  <script src="js/organizer-page.js"></script>
</body>
</html>
