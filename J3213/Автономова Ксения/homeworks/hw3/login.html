<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход - Билеты Петербурга</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/light.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="css/dark.css" media="(prefers-color-scheme: dark)">
</head>
<body>
  <a href="#maincontent" class="skip-link">Перейти к основному содержимому</a>
  <div class="ticket-platform">
    <header class="ticket-platform__header navbar navbar-expand-lg navbar-dark" role="banner">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Билеты Петербурга</a>
      </div>
    </header>
    <main id="maincontent" class="container flex-grow-1" role="main">
      <form class="ticket-platform__form" id="loginForm" aria-labelledby="loginTitle">
        <h2 class="ticket-platform__form-title" id="loginTitle">Вход</h2>
        <div class="mb-3">
          <label for="email" class="form-label">Адрес электронной почты</label>
          <input
            type="email"
            class="form-control"
            id="email"
            autocomplete="username"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            autocomplete="current-password"
            required
          />
        </div>
        <div class="mb-3">
          <label for="userType" class="form-label">Я -</label>
          <select class="form-select" id="userType" required>
            <option value="user">Пользователь</option>
            <option value="organizer">Организатор</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
        <div class="text-center mt-3">
          Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a>
        </div>
      </form>
    </main>

  </div>

  <script src="js/script.js"></script>

  <script src="js/auth-service.js"></script>
  <script src="js/auth-ui.js"></script>
</body>
</html>
