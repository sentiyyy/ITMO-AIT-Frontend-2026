<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация - Билеты Петербурга</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-9ndCyUaP1hM60h3sDkkxIhP0qKkuYIWKkL8npK6RCAn+zCbyjQF9gIxWsfFS7AGc"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="ticket-platform">
    <header class="ticket-platform__header navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Билеты Петербурга</a>
      </div>
    </header>
    <main class="container flex-grow-1">
      <form class="ticket-platform__form" id="registerForm">
        <h2 class="ticket-platform__form-title">Создать аккаунт</h2>
        <div class="mb-3">
          <label for="name" class="form-label">ФИО</label>
          <input
            type="text"
            class="form-control"
            id="name"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Адрес электронной почты</label>
          <input
            type="email"
            class="form-control"
            id="email"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            required
          />
        </div>
        <div class="mb-3">
          <label for="confirm" class="form-label">Повторите пароль</label>
          <input
            type="password"
            class="form-control"
            id="confirm"
            required
          />
        </div>
        <div class="mb-3">
          <label for="userType" class="form-label">Я -</label>
          <select class="form-select" id="userType" required>
            <option value="user">Пользователь</option>
            <option value="organizer">Организатор</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        <div class="text-center mt-3">
          Уже зарегистрированы? <a href="login.html">Войти</a>
        </div>
      </form>
    </main>

  </div>
  <script src="js/script.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const pwd = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (pwd !== confirm) {
        alert('Пароли не совпадают');
        return;
      }
      const type = document.getElementById('userType').value;
      localStorage.setItem('userType', type);
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
