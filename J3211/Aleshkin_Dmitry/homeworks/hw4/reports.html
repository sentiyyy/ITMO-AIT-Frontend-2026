<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
        (function () {
            const preference = localStorage.getItem('financeManagerTheme') || 'system';
            const resolved = preference === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : preference;
            document.documentElement.dataset.theme = resolved;
            document.documentElement.dataset.themePreference = preference;
        })();
    </script>
    <title>Отчёты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reports">
<nav class="navbar navbar-dark bg-dark" aria-label="Основная навигация">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
        <a class="navbar-brand mb-2 mb-md-0 brand-demo-link" href="index.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-wallet"></use></svg><span>FinanceManager</span></a>
        <ul class="navbar-nav flex-column flex-md-row gap-2 gap-md-3 text-center">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-home"></use></svg><span>Личный кабинет</span></a></li>
            <li class="nav-item"><a class="nav-link" href="transactions.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-wallet"></use></svg><span>Транзакции</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="reports.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-chart"></use></svg><span>Отчёты</span></a></li>
            <li class="nav-item"><a class="nav-link" href="integration.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-plug"></use></svg><span>Интеграции</span></a></li>
        </ul>
        <div class="d-flex flex-column flex-md-row align-items-center gap-2 mt-2 mt-md-0">
            <button class="btn btn-light btn-sm" data-theme-toggle></button>
            <a href="#" class="btn btn-outline-light btn-sm logout-btn">Выйти</a>
        </div>
    </div>
</nav>

<main class="container main-block">
    <div id="demoModeBanner" class="mb-4"></div>
    <h1 class="mb-4">Отчёты</h1>
    <div class="chart-box mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="mb-0">Прогнозы по бюджетам</h2>
            
        </div>
        <div id="forecastCards" class="forecast-grid"></div>
    </div>
    <div class="row g-4 align-items-start">
        <div class="col-12 col-xl-6"><div class="chart-box h-100"><h2>Расходы по категориям</h2><div id="categoryProgress"></div></div></div>
        <div class="col-12 col-xl-6"><div class="chart-box h-100"><h2>Сводка</h2><div class="table-responsive"><table class="table table-bordered"><tbody id="reportsSummary"></tbody></table></div></div></div>
    </div>
    <div class="chart-box">
        <h2>Динамика доходов и расходов</h2>
        <div id="flowEmpty" class="empty-state d-none">Пока нет данных для построения графика.</div>
        <div class="chart-canvas-wrap chart-canvas-wrap-md"><canvas id="flowChart"></canvas></div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
