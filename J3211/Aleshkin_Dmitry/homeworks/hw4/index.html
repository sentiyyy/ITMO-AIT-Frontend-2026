<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const preference = localStorage.getItem('financeManagerTheme') || 'system';
            const resolved = preference === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : preference;
            document.documentElement.dataset.theme = resolved;
            document.documentElement.dataset.themePreference = preference;
            const auth = JSON.parse(localStorage.getItem('financeManagerAuth') || 'null');
            window.location.replace(auth && auth.userId ? 'dashboard.html' : 'dashboard.html');
        })();
    </script>
    <title>FinanceManager</title>
    <style>
        html[data-theme="dark"] { color-scheme: dark; }
        html[data-theme="light"] { color-scheme: light; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        html[data-theme="light"] body { background: #dbeafe; color: #0f172a; }
    </style>
</head>
<body>Перенаправление…</body>
</html>
