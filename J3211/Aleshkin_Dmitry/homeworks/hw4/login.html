<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
        (function () {
            const preference = localStorage.getItem('financeManagerTheme') || 'system';
            const resolved = preference === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : preference;
            document.documentElement.dataset.theme = resolved;
            document.documentElement.dataset.themePreference = preference;
        })();
    </script>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark" aria-label="Навигация страницы входа">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
        <a class="navbar-brand mb-2 mb-md-0 brand-demo-link" href="index.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-wallet"></use></svg><span>FinanceManager</span></a>
        <ul class="navbar-nav flex-row gap-3">
            <li class="nav-item"><a class="nav-link active" href="login.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-login"></use></svg><span>Вход</span></a></li>
            <li class="nav-item"><a class="nav-link" href="register.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-user-plus"></use></svg><span>Регистрация</span></a></li>
        </ul>
        <button class="btn btn-light btn-sm mt-2 mt-md-0" data-theme-toggle></button>
    </div>
</nav>

<main class="container main-block">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="text-center mb-4">Вход в систему</h1>
                    <div id="authAlert" class="alert d-none"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="ivan@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Войти</button>
                        </div>
                    </form>

                    <div class="alert alert-info small mb-3">
                        Тестовый вход: <strong>ivan@example.com</strong> / <strong>123456</strong>
                    </div>

                    <p class="text-center mb-0">
                        Нет аккаунта? <a href="register.html">Зарегистрироваться</a><br>
                        <a href="dashboard.html">Посмотреть сайт в демо-режиме</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
