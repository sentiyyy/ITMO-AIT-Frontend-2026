<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
        (function () {
            const preference = localStorage.getItem('financeManagerTheme') || 'system';
            const resolved = preference === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : preference;
            document.documentElement.dataset.theme = resolved;
            document.documentElement.dataset.themePreference = preference;
        })();
    </script>
    <title>Транзакции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="transactions">
<nav class="navbar navbar-dark bg-dark" aria-label="Основная навигация">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
        <a class="navbar-brand mb-2 mb-md-0 brand-demo-link" href="index.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-wallet"></use></svg><span>FinanceManager</span></a>
        <ul class="navbar-nav flex-column flex-md-row gap-2 gap-md-3 text-center">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-home"></use></svg><span>Личный кабинет</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="transactions.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-wallet"></use></svg><span>Транзакции</span></a></li>
            <li class="nav-item"><a class="nav-link" href="reports.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-chart"></use></svg><span>Отчёты</span></a></li>
            <li class="nav-item"><a class="nav-link" href="integration.html"><svg class="icon" aria-hidden="true"><use href="img/sprite.svg#icon-plug"></use></svg><span>Интеграции</span></a></li>
        </ul>
        <div class="d-flex flex-column flex-md-row align-items-center gap-2 mt-2 mt-md-0">
            <button class="btn btn-light btn-sm" data-theme-toggle></button>
            <a href="#" class="btn btn-outline-light btn-sm logout-btn">Выйти</a>
        </div>
    </div>
</nav>

<main class="container main-block">
    <div id="demoModeBanner" class="mb-4"></div>
    <div id="transactionNotice" class="alert d-none"></div>

    <h1 class="mb-4">Транзакции</h1>

    <div class="filter-box">
        <h2>Добавление транзакции</h2>
        <form id="addTransactionForm">
            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-3"><label for="transactionAccount" class="form-label">Счёт</label><select id="transactionAccount" class="form-select" required></select></div>
                <div class="col-12 col-md-6 col-lg-2"><label for="transactionType" class="form-label">Тип</label><select id="transactionType" class="form-select"><option value="income">Доход</option><option value="expense">Расход</option></select></div>
                <div class="col-12 col-md-6 col-lg-3"><label for="transactionCategory" class="form-label">Категория</label><select id="transactionCategory" class="form-select"></select></div>
                <div class="col-12 col-md-3">
                    <label for="transactionCurrency" class="form-label">Валюта</label>
                    <select id="transactionCurrency" class="form-select">
                        <option value="RUB">₽ Рубль</option>
                        <option value="USD">$ Доллар</option>
                        <option value="EUR">€ Евро</option>
                    </select>
                </div>
                <div class="col-12 col-md-6 col-lg-2"><label for="transactionAmount" class="form-label">Сумма</label><input type="number" class="form-control" id="transactionAmount" min="1" required></div>
                <div class="col-12 col-md-6 col-lg-2"><label for="transactionDate" class="form-label">Дата</label><input type="date" class="form-control" id="transactionDate" required></div>
                <div class="col-12 col-lg-9"><label for="transactionDescription" class="form-label">Описание</label><input type="text" class="form-control" id="transactionDescription" placeholder="Например, Зарплата или Пятёрочка" required></div>
                <div class="col-12 col-lg-3 d-flex align-items-end"><button type="submit" class="btn btn-primary w-100">Добавить</button></div>
            </div>
        </form>
    </div>

    <div class="filter-box">
        <h2>Поиск и фильтрация транзакций</h2>
        <form id="filterForm">
            <div class="row g-3">
                <div class="col-12 col-md-6 col-lg-3"><label for="category" class="form-label">Категория</label><select class="form-select" id="category"><option value="all">Все</option><option value="products">Продукты</option><option value="transport">Транспорт</option><option value="entertainment">Развлечения</option><option value="utilities">Коммуналка</option><option value="health">Здоровье</option><option value="income">Доход</option><option value="other">Другое</option></select></div>
                <div class="col-12 col-md-6 col-lg-3"><label for="amount" class="form-label">Минимальная сумма</label><input type="number" class="form-control" id="amount" placeholder="0"></div>
                <div class="col-12 col-md-6 col-lg-3"><label for="dateFrom" class="form-label">Дата от</label><input type="date" class="form-control" id="dateFrom"></div>
                <div class="col-12 col-md-6 col-lg-3"><label for="dateTo" class="form-label">Дата до</label><input type="date" class="form-control" id="dateTo"></div>
            </div>
            <div class="mt-3"><button type="submit" class="btn btn-primary">Найти</button> <button type="reset" class="btn btn-secondary">Сбросить</button></div>
        </form>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-3">Список транзакций</h2>
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead><tr><th>Дата</th><th>Описание</th><th>Категория</th><th>Сумма</th><th>Действие</th></tr></thead>
                    <tbody id="transactionTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
