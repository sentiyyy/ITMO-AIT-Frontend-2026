<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Поиск и фильтрация транзакций">
    <title>СИСТЕМА_СЧЁТ : ПОИСК</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/modals.css">
</head>
<body>

<nav class="navbar-terminal" aria-label="Основное меню">
    <div class="navbar-brand" role="heading" aria-level="1">[ СИСТЕМА_СЧЁТ ]</div>
    <button class="menu-toggle-btn" id="mobileMenuToggleBtn" aria-label="Открыть мобильное меню">[ МЕНЮ ]</button>
    <div class="nav-links" id="navLinksContainer">
        <button class="menu-close-btn" id="mobileMenuCloseBtn" aria-label="Закрыть меню">[ X ]</button>
        <a href="dashboard.html">ГЛАВНАЯ</a>
        <a href="search.html">ПОИСК</a>
        <a href="reports.html">ОТЧЁТЫ</a>
        <a href="settings.html">НАСТРОЙКИ</a>
        <button class="mode-btn" id="theme-toggle" aria-label="Переключить цветовую тему">[ LIGHT_MODE ]</button>
        <a href="index.html" aria-label="Выйти из системы">[ ВЫХОД ]</a>
    </div>
</nav>

<div class="menu-overlay" id="mobileMenuOverlayElement"></div>

<main id="main-content">
    <div class="container">
        <section class="dashboard-block" aria-labelledby="filters-heading">
            <div class="block-title" id="filters-heading" role="heading" aria-level="2">&gt; ФИЛЬТРЫ</div>

            <div class="row g-3">
                <div class="col-md-8">
                    <div class="input-group mb-0">
                        <label class="input-prefix" for="searchCategory">&gt; КАТЕГОРИЯ:</label>
                        <select id="searchCategory" class="terminal-input" title="Категория"></select>
                    </div>
                </div>
                <div class="col-md-4">
                    <button id="resetFilters" class="terminal-btn mt-0" style="width: 100%;" aria-label="Сбросить фильтры">[ СБРОСИТЬ_ФИЛЬТРЫ ]</button>
                </div>

                <div class="col-md-6">
                    <div class="input-group mb-0">
                        <label for="filterDateFrom" class="input-prefix" style="font-weight: 700; padding-right: 12px; cursor: pointer;">ДАТА_ОТ:</label>
                        <input type="text" id="filterDateFrom" class="terminal-input"
                               placeholder="ДД.ММ.ГГГГ"
                               aria-label="Дата начала поиска в формате день, месяц, год">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group mb-0">
                        <label for="filterDateTo" class="input-prefix" style="font-weight: 700; padding-right: 12px; cursor: pointer;">ДАТА_ДО:</label>
                        <input type="text" id="filterDateTo" class="terminal-input"
                               placeholder="ДД.ММ.ГГГГ"
                               aria-label="Дата окончания поиска в формате день, месяц, год">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group mb-0">
                        <label class="input-prefix" for="filterSumMin">СУММА_ОТ:</label>
                        <input type="number" step="0.01" id="filterSumMin" class="terminal-input" placeholder="0.00" title="Минимальная сумма">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-group mb-0">
                        <label class="input-prefix" for="filterSumMax">СУММА_ДО:</label>
                        <input type="number" step="0.01" id="filterSumMax" class="terminal-input" placeholder="999999.00" title="Максимальная сумма">
                    </div>
                </div>
            </div>
        </section>

        <section class="dashboard-block" aria-labelledby="results-heading">
            <div class="block-title" id="results-heading" role="heading" aria-level="2">&gt; РЕЗУЛЬТАТЫ_ПОИСКА</div>

            <table class="terminal-table" id="searchTable">
                <caption class="visually-hidden">Список найденных транзакций</caption>
                <thead>
                <tr>
                    <th scope="col">ДАТА</th>
                    <th scope="col">СЧЁТ</th>
                    <th scope="col">ОПИСАНИЕ</th>
                    <th scope="col">КАТЕГОРИЯ</th>
                    <th scope="col">СУММА</th>
                </tr>
                </thead>
                <tbody id="searchResultsBody"></tbody>
            </table>

            <div id="emptySearchMessage" style="display: none;" role="status" aria-live="polite">[ СОВПАДЕНИЙ_0 ]</div>
        </section>
    </div>
</main>
<script src="../js/api.js"></script>
<script src="../js/core.js"></script>
<script src="../js/search.js"></script>
<script src="../js/theme.js"></script>
</body>
</html>
