<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Отчёты и финансовая аналитика">
    <title>СИСТЕМА_СЧЁТ : ОТЧЁТЫ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/modals.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <nav class="navbar-terminal" aria-label="Основная навигация">
        <div class="navbar-brand" role="heading" aria-level="1">[ СИСТЕМА_СЧЁТ ]</div>
        <button class="menu-toggle-btn" id="mobileMenuToggleBtn" aria-label="Открыть мобильное меню">[ МЕНЮ ]</button>
        <div class="nav-links" id="navLinksContainer">
            <button class="menu-close-btn" id="mobileMenuCloseBtn" aria-label="Закрыть меню">[ X ]</button>
            <a href="dashboard.html">ГЛАВНАЯ</a>
            <a href="search.html">ПОИСК</a>
            <a href="reports.html">ОТЧЁТЫ</a>
            <a href="settings.html">НАСТРОЙКИ</a>
            <button class="mode-btn" id="theme-toggle" aria-label="Переключить цветовую тему">[ LIGHT_MODE ]</button>
            <a href="index.html" aria-label="Выйти из системы">[ ВЫХОД ]</a>
        </div>
    </nav>
</header>

<div class="menu-overlay" id="mobileMenuOverlayElement"></div>

<main id="main-content">
    <div class="container">
        <div class="dashboard-block">
            <div class="block-title" id="label-period" role="heading" aria-level="2">&gt; ПЕРИОД_ОТЧЁТА</div>
            <div class="row g-2">
                <div class="col-md-5">
                    <label for="reportMonth"></label><select id="reportMonth" class="terminal-input" aria-labelledby="label-period">
                        <option value="1">ЯНВАРЬ</option>
                        <option value="2">ФЕВРАЛЬ</option>
                        <option value="3">МАРТ</option>
                        <option value="4">АПРЕЛЬ</option>
                        <option value="5">МАЙ</option>
                        <option value="6">ИЮНЬ</option>
                        <option value="7">ИЮЛЬ</option>
                        <option value="8">АВГУСТ</option>
                        <option value="9">СЕНТЯБРЬ</option>
                        <option value="10">ОКТЯБРЬ</option>
                        <option value="11">НОЯБРЬ</option>
                        <option value="12">ДЕКАБРЬ</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label for="reportYear"></label><select id="reportYear" class="terminal-input" aria-labelledby="label-period">
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="applyReportFilters" class="terminal-btn mt-0" aria-label="Обновить данные отчета">[ ОБНОВИТЬ ]</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="dashboard-block">
                    <div class="block-title" id="label-dynamic" role="heading" aria-level="2">&gt; ДИНАМИКА_БАЛАНСА</div>
                    <div style="height: 300px;">
                        <canvas id="balanceChart"
                                role="button"
                                tabindex="0"
                                aria-labelledby="label-dynamic"
                                aria-describedby="chart-instructions">
                        </canvas>
                        <div id="chart-instructions" class="visually-hidden">Интерактивный график. Используйте мышь или фокус для просмотра данных.</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="dashboard-block" style="min-height: 342px;">
                    <div class="block-title" role="heading" aria-level="2">&gt; ПРОГНОЗ</div>

                    <div id="forecastDetails" role="status" aria-live="polite"
                         style="text-align: left; font-size: 12px; line-height: 1.6; margin-bottom: 15px;">
                    </div>

                    <div class="block-title" id="label-remainder" style="margin-top: 5px;" role="heading" aria-level="2">&gt; ОСТАТОК_ОТ_ДОХОДА</div>
                    <div id="remainderBarContainer">
                        <div class="progress" style="height: 35px;">
                            <div id="remainderProgressBar"
                                 class="progress-bar bg-income"
                                 role="progressbar"
                                 aria-valuenow="0"
                                 aria-valuemin="0"
                                 aria-valuemax="100"
                                 aria-labelledby="label-remainder"
                                 style="width: 0;">0%</div>
                        </div>
                    </div>

                    <hr aria-hidden="true">
                    <div id="statusLabel" role="status" aria-live="polite"
                         style="font-weight: 700; text-align: center; text-transform: uppercase; font-size: 13px;">
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="dashboard-block">
                    <div class="block-title" role="heading" aria-level="2">&gt; АНАЛИЗ_ДОХОДОВ</div>
                    <div id="incomeAnalysisBody"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-block">
                    <div class="block-title" role="heading" aria-level="2">&gt; АНАЛИЗ_РАСХОДОВ</div>
                    <div id="expenseAnalysisBody"></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/api.js" defer></script>
<script src="../js/core.js" defer></script>
<script src="../js/reports.js" defer></script>
<script src="../js/theme.js"></script>
</body>
</html>
