<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Настройки системы Счёт: импорт транзакций, управление категориями и правилами автоматизации.">
    <title>СИСТЕМА_СЧЁТ : НАСТРОЙКИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/modals.css">

</head>
<body>

<header>
    <nav class="navbar-terminal" aria-label="Основное меню">
        <div class="navbar-brand" role="heading" aria-level="1">[ СИСТЕМА_СЧЁТ ]</div>
        <button class="menu-toggle-btn" id="mobileMenuToggleBtn" aria-label="Открыть мобильное меню">[ МЕНЮ ]</button>
        <div class="nav-links" id="navLinksContainer">
            <button class="menu-close-btn" id="mobileMenuCloseBtn" aria-label="Закрыть меню">[ X ]</button>
            <a href="dashboard.html">ГЛАВНАЯ</a>
            <a href="search.html">ПОИСК</a>
            <a href="reports.html">ОТЧЁТЫ</a>
            <a href="settings.html">НАСТРОЙКИ</a>
            <button class="mode-btn" id="theme-toggle" aria-label="Переключить цветовую тему">[ LIGHT_MODE ]</button>
            <a href="index.html" aria-label="Выйти из системы">[ ВЫХОД ]</a>
        </div>
    </nav>
</header>

<div class="menu-overlay" id="mobileMenuOverlayElement"></div>

<main id="main-content">
    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="dashboard-block h-100">
                    <div class="block-title" role="heading" aria-level="2">&gt; КОНФИГУРАЦИЯ_СИСТЕМЫ</div>

                    <div style="margin-bottom: 30px;">
                        <p style="font-size: 11px; color: var(--accent-color);" aria-hidden="true">[ 1 ]
                            ИМПОРТ_ТРАНЗАКЦИЙ</p>
                        <input type="file" id="csvFileInput" accept=".csv" style="display: none;" aria-hidden="true">
                        <button class="terminal-btn w-100" id="triggerCsvUpload"
                                aria-label="Загрузить файл транзакций в формате CSV">[ ЗАГРУЗИТЬ_CSV ]
                        </button>
                        <div id="importStatus" role="status" aria-live="polite"
                             style="font-size: 10px; margin-top: 5px;"></div>
                    </div>

                    <hr aria-hidden="true">

                    <div style="margin-bottom: 30px;">
                        <p id="label-new-cat" style="font-size: 11px; color: var(--accent-color);">[ 2 ]
                            НОВАЯ_КАТЕГОРИЯ</p>
                        <form id="addCategoryForm" class="category-row">
                            <div class="input-group">
                                <span class="input-prefix"></span>
                                <label for="newCategoryName"></label><input type="text" id="newCategoryName"
                                                                            class="terminal-input"
                                                                            placeholder="ПУТЕШЕСТВИЕ"
                                                                            autocomplete="off"
                                                                            aria-labelledby="label-new-cat">
                            </div>
                            <button type="submit" class="terminal-btn btn-inline" aria-label="Добавить категорию">[ + ]
                            </button>
                        </form>
                    </div>

                    <hr aria-hidden="true">

                    <div>
                        <p style="font-size: 11px; color: var(--accent-color);" aria-hidden="true">[ 3 ]
                            ПРАВИЛО_АВТОМАТИЗАЦИИ</p>
                        <form id="ruleForm">
                            <div class="input-group mb-2">
                                <span class="input-prefix" id="label-keyword" style="font-size: 11px;">ЕСЛИ:</span>
                                <label for="ruleKeyword"></label><input type="text" id="ruleKeyword"
                                                                        class="terminal-input"
                                                                        placeholder="КЛЮЧЕВОЕ_СЛОВО" autocomplete="off"
                                                                        aria-labelledby="label-keyword">
                            </div>
                            <div class="input-group mb-3">
                                <span class="input-prefix" id="label-category-select"
                                      style="font-size: 11px;">ТО:</span>
                                <label for="ruleCategory"></label><select id="ruleCategory" class="terminal-input"
                                                                          aria-labelledby="label-category-select"></select>
                            </div>
                            <button type="submit" class="terminal-btn w-100" aria-label="Создать новое правило">[
                                СОЗДАТЬ_ПРАВИЛО ]
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="dashboard-block h-100 d-flex flex-column">
                    <div class="block-title" role="heading" aria-level="2">&gt; СПИСОК_ПРАВИЛ</div>
                    <div id="rulesListBody"
                         role="region" aria-label="Список созданных правил автоматизации"
                         style="flex: 1; max-height: 250px; overflow-y: auto; margin-bottom: 20px;">
                    </div>

                    <div class="block-title" style="margin-top: auto;" role="heading" aria-level="2">&gt;
                        СПИСОК_КАТЕГОРИЙ
                    </div>
                    <div id="categoryListBody"
                         role="region" aria-label="Список существующих категорий"
                         style="flex: 1; max-height: 250px; overflow-y: auto;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/api.js" defer></script>
<script src="../js/core.js" defer></script>
<script src="../js/settings.js" defer></script>
<script src="../js/theme.js"></script>
</body>
</html>
