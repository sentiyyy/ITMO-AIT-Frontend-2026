<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Авторизация в системе">
    <title>СИСТЕМА_СЧЁТ : ВХОД</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<main>
    <div class="terminal-wrapper">
        <div class="terminal-box">
            <div class="terminal-title" role="heading" aria-level="1">[ СИСТЕМА_СЧЁТ : ВХОД ]</div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="loginEmail" class="input-prefix" style="cursor: pointer;">
                        &gt; <span class="visually-hidden">Электронная почта</span>
                    </label>
                    <input type="email" id="loginEmail" class="terminal-input"
                           placeholder="TEST@MAIL.COM" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="loginPassword" class="input-prefix" style="cursor: pointer;">
                        &gt; <span class="visually-hidden">Пароль</span>
                    </label>
                    <input type="password" id="loginPassword" class="terminal-input"
                           placeholder="ПАРОЛЬ (8 СИМВОЛОВ)" required autocomplete="current-password">
                </div>

                <button type="submit" class="terminal-btn" aria-label="Войти в систему">[ ВОЙТИ ]</button>
            </form>

            <a href="register.html" class="terminal-link" aria-label="Зарегистрировать новый аккаунт">НЕТ_ДОСТУПА?[ РЕГИСТРАЦИЯ ]</a>
        </div>
    </div>
</main>
<script src="../js/api.js"></script>
<script src="../js/core.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
