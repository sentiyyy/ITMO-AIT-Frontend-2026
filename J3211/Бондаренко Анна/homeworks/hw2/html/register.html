<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Регистрация нового пользователя">
    <title>СИСТЕМА_СЧЁТ : РЕГИСТРАЦИЯ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/form.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<main>
    <div class="terminal-wrapper">
        <div class="terminal-box">
            <div class="terminal-title" role="heading" aria-level="1">[ СИСТЕМА_СЧЁТ : РЕГИСТРАЦИЯ ]</div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="regEmail" class="input-prefix" style="cursor: pointer;">
                        &gt; <span class="visually-hidden">Электронная почта для регистрации</span>
                    </label>
                    <input type="email" id="regEmail" class="terminal-input"
                           placeholder="TEST@MAIL.COM" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="regPassword" class="input-prefix" style="cursor: pointer;">
                        &gt; <span class="visually-hidden">Придумайте пароль</span>
                    </label>
                    <input type="password" id="regPassword" class="terminal-input"
                           placeholder="ПАРОЛЬ (8 СИМВОЛОВ)" required autocomplete="new-password">
                </div>

                <button type="submit" class="terminal-btn" aria-label="Создать новый аккаунт">[ СОЗДАТЬ_АККАУНТ ]</button>
            </form>

            <a href="index.html" class="terminal-link" aria-label="Вернуться на страницу входа">ЕСТЬ_АККАУНТ? [ ВХОД ]</a>
        </div>
    </div>
</main>
<script src="../js/api.js"></script>
<script src="../js/core.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
