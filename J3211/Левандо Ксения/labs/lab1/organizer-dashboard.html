<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Sell event tickets online. Organizer dashboard: create events & check selling stats.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navMenu" 
            aria-label="Open navigation menu">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>
                <!-- toggle theme -->
                <button onclick="toggleTheme()" class="theme-switch-alt" id="themeToggle" aria-label="Switch theme">
                    <div class="theme-switch-alt-container">
                        <div class="theme-switch-alt-icons">
                            <span class="theme-icon-sun">☀️</span>
                            <span class="theme-icon-moon">🌙</span>
                        </div>
                        <div class="theme-switch-alt-track">
                            <div class="theme-switch-alt-thumb">
                                <span id="themeIconAlt" class="theme-icon-active">☀️</span>
                            </div>
                        </div>
                    </div>
                    <span id="themeTextAlt" class="theme-text-alt">Dark mode</span>
                </button>
                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
     <main>
     <div class="container my-5">
  <h1 class="mb-4">Organizer Dashboard</h1>

  <!-- create new event -->
  <h3>Create New Event</h3>
  <form id="createEventForm" class="mb-5">
    <div class="row g-2">
      <div class="col-md-4">
        <label for="eventName" class="visually-hidden">Event Name</label>
        <input type="text" id="eventName" class="form-control" placeholder="Event Name" required>
      </div>
      <div class="col-md-4">
        <label for="eventDate" class="visually-hidden">Event Date</label>
        <input type="date" id="eventDate" class="form-control" required min="">
      </div>
      <div class="col-md-4">
        <label for="eventCity" class="visually-hidden">Event City</label>
        <input type="text" id="eventCity" class="form-control" placeholder="City" required>
      </div>
      <div class="col-md-4">
        <label for="eventVenue" class="visually-hidden">Event Venue</label>
        <input type="text" id="eventVenue" class="form-control" placeholder="Venue" required>
      </div>

      <div class="col-md-4">
      <label for="eventType" class="visually-hidden">Event Type *</label>
      <select id="eventType" class="form-select">
      <option value="">Choose type</option>
      <option value="Concert">Concert</option>
      <option value="Festival">Festival</option>
      <option value="Theatre">Theatre</option>
      <option value="Sport">Sport</option>
      <option value="Exhibition">Exhibition</option>
      <option value="Other">Other</option>
      </select>
      </div>

      <div class="col-md-4">
        <label for="eventImage" class="visually-hidden">Image URL</label>
        <input type="text" id="eventImage" class="form-control" placeholder="Image URL">
      </div>
      <div class="mt-3">
        <label for="eventDescription" class="visually-hidden">Event Description</label>
        <textarea id="eventDescription" class="form-control" rows="3" placeholder="Event description"></textarea>
      </div>
      <div class="mt-3">
        <label for="eventSeatmap" class="visually-hidden">Seatmap Image Path</label>
        <input type="text" id="eventSeatmap" class="form-control" placeholder="Seatmap image path (example: assets/seatmap1.jpg)">
      </div>
      <hr>
      <h5>Ticket Categories</h5>
      <div id="categoriesContainer" aria-live="polite" aria-label="Ticket categories list"></div>
      <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="addCategoryBtn">
      + Add Category
      </button>
      <br>
    </div>
    <button type="submit" class="btn btn-success mt-3">Create Event</button>
  </form>

  <!-- list of events -->
  <h3>My Events</h3>
  <div id="myEventsContainer" class="row g-3"></div>
    </div>
    </main>
      <!-- Template Modal -->
     <div class="modal fade" id="appModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title" id="appModalTitle">Info</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="appModalBody">
                Message
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                OK
                </button>
            </div>

            </div>
        </div>
    </div>
     <!-- Confirm Modal-->
      <div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="confirmTitle">Confirm</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="confirmMessage"></div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>
        <button class="btn btn-danger" id="confirmActionBtn">
          Yes
        </button>
      </div>

    </div>
  </div>
</div>
    <!-- Footer -->
     <footer class="site-footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/organizer-dashboard.js"></script>
</body>
</html>
