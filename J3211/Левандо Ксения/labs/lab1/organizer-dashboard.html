<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
     <div class="container my-5">
  <h1 class="mb-4">Organizer Dashboard</h1>

  <!-- create new event -->
  <h3>Create New Event</h3>
  <form id="createEventForm" class="mb-5">
    <div class="row g-2">
      <div class="col-md-4">
        <input type="text" id="eventName" class="form-control" placeholder="Event Name" required>
      </div>
      <div class="col-md-4">
        <input type="date" id="eventDate" class="form-control" required min="">
      </div>
      <div class="col-md-4">
        <input type="text" id="eventCity" class="form-control" placeholder="City" required>
      </div>
      <div class="col-md-4">
        <input type="text" id="eventVenue" class="form-control" placeholder="Venue" required>
      </div>

      <div class="col-md-4">
      <select id="eventType" class="form-select">
      <option value="">Choose type</option>
      <option value="Concert">Concert</option>
      <option value="Festival">Festival</option>
      <option value="Theatre">Theatre</option>
      <option value="Sport">Sport</option>
      <option value="Exhibition">Exhibition</option>
      <option value="Other">Other</option>
      </select>
      </div>

      <div class="col-md-4">
        <input type="text" id="eventImage" class="form-control" placeholder="Image URL">
      </div>
      <div class="mt-3">
        <textarea id="eventDescription" class="form-control" rows="3" placeholder="Event description"></textarea>
      </div>
      <div class="mt-3">
        <input type="text" id="eventSeatmap" class="form-control" placeholder="Seatmap image path (example: assets/seatmap1.jpg)">
      </div>
      <hr>
      <h5>Ticket Categories</h5>
      <div id="categoriesContainer"></div>
      <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="addCategoryBtn">
      Add Category
      </button>
      <br>
    </div>
    <button type="submit" class="btn btn-success mt-3">Create Event</button>
  </form>

  <!-- list of events -->
  <h3>My Events</h3>
  <div id="myEventsContainer" class="row g-3"></div>
</div>

  <button id="logoutBtn" class="btn btn-danger">Logout</button>


    <!-- Footer -->
     <footer class="site-footer">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/organizer-dashboard.js"></script>
</body>
</html>
