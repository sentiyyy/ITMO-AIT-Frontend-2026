<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">События</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Вход</a>
                    <a href="register.html" class="btn btn-warning">Регистрация</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
     <div class="container my-5">
    <h1 id="eventTitle"></h1>
    <img id="eventImage" class="img-fluid mb-4">
    <p id="eventDescription"></p>
    <p id="eventVenue" class="text-muted"></p>
    <p class="text-muted" id="eventMeta"></p>
    <button class="btn btn-warning" id="buyBtn">
    Buy ticket
    </button>
    <!-- seat map -->
    <h3 class="mt-3">Seat Map</h3>
    <img id="seatMap" class="img-fluid mb-4" src="" alt="Seat Map">

    <!-- reviews -->
        <h3>Reviews</h3>
        <div id="reviewsContainer">
        <p class="text-muted">No reviews yet.</p>
        </div>

        <div class="mb-3">
        <label for="reviewInput" class="form-label">Leave a review</label>
        <textarea id="reviewInput" class="form-control" rows="2"></textarea>
        <button class="btn btn-primary mt-2" id="submitReview">Submit</button>
        </div>

    </div>

    <!-- Footer -->
     <footer class="site-footer">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/event.js"></script>
</body>
</html>
