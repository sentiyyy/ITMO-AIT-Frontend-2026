<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Buy event tickets online. Event page with seat map, description and pricing.">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navMenu" 
            aria-label="Open navigation menu">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>


            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>
                <!-- toggle theme -->
                <button onclick="toggleTheme()" class="theme-switch-alt" id="themeToggle" aria-label="Switch theme">
                    <div class="theme-switch-alt-container">
                        <div class="theme-switch-alt-icons">
                            <span class="theme-icon-sun">☀️</span>
                            <span class="theme-icon-moon">🌙</span>
                        </div>
                        <div class="theme-switch-alt-track">
                            <div class="theme-switch-alt-thumb">
                                <span id="themeIconAlt" class="theme-icon-active">☀️</span>
                            </div>
                        </div>
                    </div>
                    <span id="themeTextAlt" class="theme-text-alt">Dark mode</span>
                </button>
                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

     <!-- Content -->
      <main>
    <div class="container my-5">
        <div class="row g-4">
            <!-- left: image -->
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <img id="eventImage" class="card-img-top" style="height: 400px; object-fit: cover;">
                    <div class="card-body">
                        <span class="badge bg-secondary mb-2" id="eventType"></span>
                        <h3 id="eventTitle" class="card-title"></h3>
                        <p class="text-muted" id="eventMeta"></p>
                        <p id="eventVenue"></p>
                        <button class="btn btn-warning w-100" id="buyBtn">
                            <!-- add an icon -->
                            <svg class="icon icon-scaling" width="24" height="24">
                            <use xlink:href="sprite.svg#icon-buy"></use>
                            </svg>
                            Buy ticket</button>
                    </div>
                </div>
            </div>

            <!-- right: description + reviews -->
            <div class="col-md-7">
                <h4>Description</h4>
                <p id="eventDescription"></p>

                <h4 class="mt-4">Seat Map</h4>
                <img id="seatMap" class="img-fluid mb-4" src="" alt="Seat Map" style="max-height: 300px; object-fit: contain;">

                <h4>Reviews</h4>
                <div id="reviewsContainer" class="mb-3">
                    <p class="text-muted">No reviews yet.</p>
                </div>

                <div class="mb-3">
                    <label for="reviewInput" class="form-label">Leave a review</label>
                    <textarea id="reviewInput" class="form-control" rows="2"></textarea>
                    <button class="btn btn-primary mt-2" id="submitReview">Submit</button>
                </div>
            </div>
        </div>
    </div>
    </main>
    <!-- Buy Ticket Modal -->
        <div class="modal fade" id="buyTicketModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Select Ticket Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="ticketCategory" class="form-select mb-3"></select>
                <p id="ticketPrice" class="fw-bold"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-warning" id="confirmBuyBtn">Buy</button>
            </div>
            </div>
        </div>
        </div>
    <!-- Template Modal -->
     <div class="modal fade" id="appModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title" id="appModalTitle">Info</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="appModalBody">
                Message
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                OK
                </button>
            </div>

            </div>
        </div>
    </div>
    </div>

    <!-- Footer -->
     <footer class="site-footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/event.js"></script>
</body>
</html>
