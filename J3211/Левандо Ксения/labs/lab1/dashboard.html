<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">События</a>
                    </li>
                </ul>

                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Вход</a>
                    <a href="register.html" class="btn btn-warning">Регистрация</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container my-5">

        <h1 class="mb-4">My Account</h1>

            <div class="row">
            <!-- USER INFO -->
                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body text-center">
                            <div class="mb-3">
                                <div class="bg-secondary rounded-circle mx-auto"
                                    style="width:80px;height:80px;"></div>
                            </div>
                            <h5 id="userName">User Name</h5>
                            <p class="text-muted" id="userEmail">email@email.com</p>
                            <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                                Logout
                            </button>
                        </div>
                    </div>
                </div>

                <!-- TICKETS -->
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="mb-3">My Tickets</h5>
                            <div id="ticketsList"></div>
                        </div>
                    </div>
                </div>

            </div>
    </main>

    <!-- Footer -->
     <footer class="site-footer">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
