<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Buy event tickets online. Log in page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navMenu" 
            aria-label="Open navigation menu">
                <span class="navbar-toggler-icon" aria-hidden="true"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                </ul>
                <!-- toggle theme -->
                <button onclick="toggleTheme()" class="theme-switch-alt" id="themeToggle" aria-label="Switch theme">
                    <div class="theme-switch-alt-container">
                        <div class="theme-switch-alt-icons">
                            <span class="theme-icon-sun">☀️</span>
                            <span class="theme-icon-moon">🌙</span>
                        </div>
                        <div class="theme-switch-alt-track">
                            <div class="theme-switch-alt-thumb">
                                <span id="themeIconAlt" class="theme-icon-active">☀️</span>
                            </div>
                        </div>
                    </div>
                    <span id="themeTextAlt" class="theme-text-alt">Dark mode</span>
                </button>
                <div class="d-flex" id="authButtons">
                    <a href="login.html" class="btn btn-outline-light me-3">Login</a>
                    <a href="register.html" class="btn btn-warning">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
     <main>
    <section class="vh-100">
    <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-lg-10">
            <div class="card shadow" style="border-radius: 20px;">
            <div class="card-body p-5">
                <div class="row">

              <!-- Form -->
              <div class="col-md-6">

                <h2 class="text-center mb-4">Log in</h2>

                <form id="loginForm">

                  <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="loginEmail" required>
                    <label for="loginEmail" class="form-label">Email address</label>
                  </div>

                  <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="loginPassword" required>
                    <label for="loginPassword" class="form-label">Password</label>
                  </div>

                <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                  <button class="btn btn-primary btn-lg" type="submit">
                    Login
                  </button>
                  </div>
                </form>                
                <!-- Link -->
                  <p class="text-center">
                    Don't have an account?
                    <a href="register.html">Register</a>
                  </p>
                  <!-- showrunner login -->
                   <p class="text-center mt-3">
                    If you are an organizer, 
                    <a href="organizer-login.html">click here</a>
                  </p>
              </div>

              <!-- Image -->
              <div class="col-md-6 d-flex align-items-center">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                     class="img-fluid" alt="image">
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
 </main>
    <!-- Footer -->
     <footer class="site-footer mt-auto">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/login.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
