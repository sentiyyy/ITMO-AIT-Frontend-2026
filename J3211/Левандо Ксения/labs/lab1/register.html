<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ticket-tac.com </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Ticket-Tac</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">События</a>
                    </li>
                </ul>

                <div class="d-flex">
                    <a href="login.html" class="btn btn-outline-light me-3">Вход</a>
                    <a href="register.html" class="btn btn-warning">Регистрация</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <section class="vh-100" style="background-color: #eee;">
      <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-lg-10">
            <div class="card shadow" style="border-radius: 20px;">
              <div class="card-body p-5">
                <div class="row">

              <!-- Form -->
                  <div class="col-md-6">

                  <h2 class="text-center mb-4">Sign up</h2>

                    <form id="registerForm">

                      <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="name" placeholder="Name">
                        <label for="name">Your Name</label>
                      </div>

                      <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="Email">
                        <label for="email">Your Email</label>
                      </div>

                      <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Password">
                        <label for="password">Password</label>
                      </div>

                      <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="repeatPassword" placeholder="Repeat">
                        <label for="repeatPassword">Repeat password</label>
                      </div>

                      <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="terms">
                        <label class="form-check-label" for="terms">
                          I agree to Terms of service
                        </label>
                      </div>

                      <button class="btn btn-primary w-100" type="submit">
                        Register
                      </button>

                    </form>
                  </div>

              <!-- Image -->
                  <div class="col-md-6 d-flex align-items-center">
                    <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                        class="img-fluid" alt="image">
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
       </div>
    </section>
    <!-- Footer -->
     <footer class="site-footer">
        <div class="container text-center">
            <p class="mb-1">© 2026 EventTickets</p>
            <small>ITMO AIT Front-End Project</small>
        </div>
    </footer>

    <!-- Add JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/register.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
