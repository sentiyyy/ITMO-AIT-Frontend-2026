<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Вход</title>
  <meta name="description" content="Страница входа в аккаунт пользователя TicketHub">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="auth-page">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
  </div>
</nav>

<main class="auth-wrapper container py-5" role="main">
  <section class="auth-card card shadow border-0 rounded-4 mx-auto p-4 p-md-5">

    <header class="text-center mb-4">
      <h1 class="h3 fw-bold">Вход в аккаунт</h1>
      <p class="text-secondary mb-0">Введите почту и пароль для входа</p>
    </header>

    <form id="loginForm" novalidate>

      <div class="mb-3">
        <label for="loginEmail" class="form-label">Email</label>
        <input type="email"
               class="form-control form-control-lg"
               id="loginEmail"
               placeholder="name@example.com"
               required
               aria-required="true"
               aria-label="Введите email">
        <div class="invalid-feedback">Введите корректный email</div>
      </div>

      <div class="mb-3">
        <label for="loginPassword" class="form-label">Пароль</label>
        <input type="password"
               class="form-control form-control-lg"
               id="loginPassword"
               minlength="6"
               placeholder="Минимум 6 символов"
               required
               aria-required="true"
               aria-label="Введите пароль">
        <div class="invalid-feedback">Введите пароль не короче 6 символов</div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit"
                class="btn btn-primary btn-lg"
                aria-label="Войти в аккаунт">
          Войти
        </button>
      </div>

      <p class="text-center text-secondary mb-0">
        Нет аккаунта?
        <a href="register.html" aria-label="Перейти к регистрации">Зарегистрироваться</a>
      </p>

    </form>

    <section id="loginAlert"
             class="mt-3"
             aria-live="polite">
    </section>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
