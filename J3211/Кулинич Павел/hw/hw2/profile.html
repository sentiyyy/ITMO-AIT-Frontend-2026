<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Личный кабинет</title>
  <meta name="description" content="Личный кабинет пользователя с просмотром и управлением билетами">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
    <div class="d-flex gap-2">
      <a href="search.html" class="btn btn-outline-light" aria-label="Перейти к поиску мероприятий">Поиск</a>
    </div>
  </div>
</nav>

<main class="py-5" role="main">
  <div class="container">
    <div class="row g-4 mb-4">

      <section class="col-lg-4">
        <article class="card border-0 shadow-sm rounded-4 h-100">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold">Профиль пользователя</h1>
            <p class="text-secondary mb-3">Иван Петров</p>

            <ul class="list-group list-group-flush">
              <li class="list-group-item px-0">Email: ivan@example.com</li>
              <li class="list-group-item px-0">Статус: Активный пользователь</li>
              <li class="list-group-item px-0">Билетов куплено: 4</li>
            </ul>
          </div>
        </article>
      </section>

      <section class="col-lg-8">
        <article class="card border-0 shadow-sm rounded-4 h-100">
          <div class="card-body p-4">

            <header class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
              <h2 class="h4 fw-bold mb-0">Купленные билеты</h2>
              <span class="badge text-bg-success">Возврат доступен до 24 часов до начала</span>
            </header>

            <section id="ticketsList"
                     class="row g-3"
                     aria-live="polite">
            </section>

          </div>
        </article>
      </section>

    </div>
  </div>
</main>

<div class="modal fade"
     id="refundModal"
     tabindex="-1"
     aria-labelledby="refundModalLabel"
     aria-hidden="true"
     role="dialog">

  <div class="modal-dialog modal-dialog-centered">
    <section class="modal-content rounded-4">

      <header class="modal-header border-0">
        <h5 class="modal-title" id="refundModalLabel">Подтвердите возврат</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Закрыть окно"></button>
      </header>

      <div class="modal-body text-secondary"
           id="refundText"
           aria-live="polite">
      </div>

      <div class="modal-footer border-0">
        <button type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal"
                aria-label="Отменить возврат">
          Отмена
        </button>

        <button type="button"
                class="btn btn-danger"
                id="confirmRefundBtn"
                aria-label="Подтвердить возврат билета">
          Оформить возврат
        </button>
      </div>

    </section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
