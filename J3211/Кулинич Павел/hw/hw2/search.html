<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Поиск мероприятий</title>
  <meta name="description" content="Поиск мероприятий с фильтрацией по типу, дате и месту проведения">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
    <div class="d-flex gap-2">
      <a href="profile.html" class="btn btn-outline-light" aria-label="Перейти в личный кабинет">Кабинет</a>
    </div>
  </div>
</nav>

<main class="py-5" role="main">
  <div class="container">

    <header class="mb-4">
      <h1 class="fw-bold">Поиск мероприятий</h1>
      <p class="text-secondary">Используйте фильтрацию по типу, дате и месту проведения</p>
    </header>

    <section class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">

        <form>
          <div class="row g-3 align-items-end">

            <div class="col-md-4">
              <label for="typeFilter" class="form-label">Тип</label>
              <select id="typeFilter" class="form-select" aria-label="Фильтр по типу мероприятия">
                <option value="">Все типы</option>
                <option value="Концерт">Концерт</option>
                <option value="Театр">Театр</option>
                <option value="Выставка">Выставка</option>
                <option value="Спорт">Спорт</option>
                <option value="Стендап">Стендап</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="dateFilter" class="form-label">Дата</label>
              <input type="date" id="dateFilter" class="form-control" aria-label="Фильтр по дате">
            </div>

            <div class="col-md-4">
              <label for="locationFilter" class="form-label">Место</label>
              <input type="text"
                     id="locationFilter"
                     class="form-control"
                     placeholder="Например, Москва"
                     aria-label="Фильтр по месту проведения">
            </div>

          </div>

          <div class="d-flex flex-wrap gap-2 mt-3">
            <button id="applyFilters" type="button" class="btn btn-primary" aria-label="Применить фильтры">
              Применить фильтры
            </button>
            <button id="resetFilters" type="button" class="btn btn-outline-secondary" aria-label="Сбросить фильтры">
              Сбросить
            </button>
          </div>
        </form>

      </div>
    </section>

    <section class="row g-4" id="eventsGrid" aria-live="polite"></section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
