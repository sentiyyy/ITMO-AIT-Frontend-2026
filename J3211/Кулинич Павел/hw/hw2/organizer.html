<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Кабинет организатора</title>
  <meta name="description" content="Кабинет организатора для создания и управления событиями">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
    <div class="d-flex gap-2">
      <a href="search.html" class="btn btn-outline-light" aria-label="Перейти в каталог мероприятий">Каталог</a>
    </div>
  </div>
</nav>

<main class="py-5" role="main">
  <div class="container">

    <header class="mb-4">
      <h1 class="fw-bold">Личный кабинет организатора</h1>
      <p class="text-secondary">Создание событий и управление продажами билетов</p>
    </header>

    <div class="row g-4">

      <section class="col-lg-5">
        <article class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">

            <h2 class="h4 fw-bold mb-3">Создать событие</h2>

            <form id="organizerForm" novalidate>

              <div class="mb-3">
                <label class="form-label" for="orgTitle">Название</label>
                <input class="form-control"
                       id="orgTitle"
                       required
                       aria-required="true"
                       aria-label="Введите название события">
              </div>

              <div class="mb-3">
                <label class="form-label" for="orgType">Тип</label>
                <select class="form-select"
                        id="orgType"
                        required
                        aria-required="true"
                        aria-label="Выберите тип события">
                  <option value="">Выберите тип</option>
                  <option>Концерт</option>
                  <option>Театр</option>
                  <option>Выставка</option>
                  <option>Спорт</option>
                  <option>Стендап</option>
                </select>
              </div>

              <div class="row g-3 mb-3">

                <div class="col-md-6">
                  <label class="form-label" for="orgDate">Дата</label>
                  <input type="date"
                         class="form-control"
                         id="orgDate"
                         required
                         aria-required="true"
                         aria-label="Выберите дату события">
                </div>

                <div class="col-md-6">
                  <label class="form-label" for="orgPlace">Город</label>
                  <input class="form-control"
                         id="orgPlace"
                         required
                         aria-required="true"
                         aria-label="Введите город проведения">
                </div>

              </div>

              <div class="mb-3">
                <label class="form-label" for="orgDescription">Описание</label>
                <textarea class="form-control"
                          id="orgDescription"
                          rows="4"
                          required
                          aria-required="true"
                          aria-label="Введите описание события"></textarea>
              </div>

              <button class="btn btn-primary w-100"
                      type="submit"
                      aria-label="Сохранить событие">
                Сохранить событие
              </button>

            </form>

            <section id="organizerAlert"
                     class="mt-3"
                     aria-live="polite">
            </section>

          </div>
        </article>
      </section>

      <section class="col-lg-7">

        <div class="row g-3 mb-3">

          <div class="col-md-4">
            <article class="stat-card rounded-4 p-4 shadow-sm h-100">
              <p class="small text-secondary mb-1">Активных событий</p>
              <p class="display-6 fw-bold mb-0">12</p>
            </article>
          </div>

          <div class="col-md-4">
            <article class="stat-card rounded-4 p-4 shadow-sm h-100">
              <p class="small text-secondary mb-1">Продано билетов</p>
              <p class="display-6 fw-bold mb-0">2 458</p>
            </article>
          </div>

          <div class="col-md-4">
            <article class="stat-card rounded-4 p-4 shadow-sm h-100">
              <p class="small text-secondary mb-1">Выручка</p>
              <p class="display-6 fw-bold mb-0">6.2M</p>
            </article>
          </div>

        </div>

        <section class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">
            <h2 class="h4 fw-bold mb-3">Мои события</h2>

            <section id="organizerEvents"
                     class="row g-3"
                     aria-live="polite">
            </section>

          </div>
        </section>

      </section>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
