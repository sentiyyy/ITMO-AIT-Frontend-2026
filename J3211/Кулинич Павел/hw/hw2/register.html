<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Регистрация</title>
  <meta name="description" content="Регистрация пользователя в системе TicketHub">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="auth-page">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
  </div>
</nav>

<main class="auth-wrapper container py-5" role="main">
  <section class="auth-card card shadow border-0 rounded-4 mx-auto p-4 p-md-5">

    <header class="text-center mb-4">
      <h1 class="h3 fw-bold">Регистрация</h1>
      <p class="text-secondary mb-0">Создайте аккаунт покупателя билетов</p>
    </header>

    <form id="registerForm" novalidate>

      <div class="row g-3">

        <div class="col-md-6">
          <label for="firstName" class="form-label">Имя</label>
          <input type="text"
                 class="form-control form-control-lg"
                 id="firstName"
                 required
                 aria-required="true"
                 aria-label="Введите имя">
          <div class="invalid-feedback">Введите имя</div>
        </div>

        <div class="col-md-6">
          <label for="lastName" class="form-label">Фамилия</label>
          <input type="text"
                 class="form-control form-control-lg"
                 id="lastName"
                 required
                 aria-required="true"
                 aria-label="Введите фамилию">
          <div class="invalid-feedback">Введите фамилию</div>
        </div>

      </div>

      <div class="mt-3">
        <label for="registerEmail" class="form-label">Email</label>
        <input type="email"
               class="form-control form-control-lg"
               id="registerEmail"
               required
               aria-required="true"
               aria-label="Введите email">
        <div class="invalid-feedback">Введите корректный email</div>
      </div>

      <div class="mt-3">
        <label for="registerPassword" class="form-label">Пароль</label>
        <input type="password"
               class="form-control form-control-lg"
               id="registerPassword"
               minlength="6"
               required
               aria-required="true"
               aria-label="Введите пароль">
        <div class="invalid-feedback">Пароль должен содержать минимум 6 символов</div>
      </div>

      <div class="mt-3">
        <label for="role" class="form-label">Тип аккаунта</label>
        <select id="role"
                class="form-select form-select-lg"
                required
                aria-required="true"
                aria-label="Выберите тип аккаунта">
          <option value="">Выберите вариант</option>
          <option value="user">Покупатель</option>
          <option value="organizer">Организатор</option>
        </select>
        <div class="invalid-feedback">Выберите тип аккаунта</div>
      </div>

      <div class="form-check mt-3">
        <input class="form-check-input"
               type="checkbox"
               id="agree"
               required
               aria-required="true"
               aria-label="Согласие с правилами сервиса">
        <label class="form-check-label" for="agree">
          Я согласен с правилами сервиса
        </label>
        <div class="invalid-feedback">Нужно подтвердить согласие</div>
      </div>

      <div class="d-grid mt-4">
        <button type="submit"
                class="btn btn-primary btn-lg"
                aria-label="Создать аккаунт">
          Создать аккаунт
        </button>
      </div>

    </form>

    <section id="registerAlert"
             class="mt-3"
             aria-live="polite">
    </section>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
