<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark">
<main class="container d-flex justify-content-center align-items-center py-5">
    <div class="card p-4 rounded-4" style="max-width: 460px; width: 100%;">
        <p class="text-center mb-3"><b>Вход</b></p>
        <form action="courses.html" method="get">
            <div class="mb-3">
                <label for="InputEmail" class="form-label">Адрес</label>
                <input type="email" class="form-control" id="InputEmail" required>
            </div>
            <div class="mb-3">
                <label for="InputPassword" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="InputPassword" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="Check">
                <label class="form-check-label" for="Check">Запомнить меня</label>
            </div>
            <div class="d-flex justify-content-center mb-3">
                <button type="submit" class="btn btn-primary w-75">Войти</button>
            </div>
            <p class="text-center mt-3 mb-0">
                Нет аккаунта?
                <a href="register.html" class="link-primary">Зарегистрироваться</a>
            </p>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
