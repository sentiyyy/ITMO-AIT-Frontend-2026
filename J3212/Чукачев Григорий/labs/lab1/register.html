<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финанас - Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 450px; border-radius: 15px;">
    <div class="text-center mb-6">
      <div class="d-flex justify-content-center align-items-center mb-2">
        <img src="img/logo.png" alt="Логотип Финанас" width="45" class="me-2">
        <h2 class="text-success fw-bold">Регистрация</h2>
          </div>
      <p class="text-muted">Присоединяйся к "Финанас"</p>
    </div>

    <form>
      <div class="mb-3">
        <label for="nameInput" class="form-label">Как к Вам обращаться?</label>
        <input type="text" class="form-control" id="nameInput" placeholder="Ваше имя или никнейм" required>
      </div>

      <div class="mb-3">
        <label for="emailInput" class="form-label">Email</label>
        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
      </div>

      <div class="mb-3">
        <label for="passwordInput" class="form-label">Придумайте пароль</label>
        <input type="password" class="form-control" id="passwordInput" required>
        <div class="form-text">Пароль должен содержать не менее 8 символов.</div>
      </div>

      <div class="mb-4">
        <label for="passwordConfirm" class="form-label">Повторите пароль</label>
        <input type="password" class="form-control" id="passwordConfirm" required>
      </div>

      <button type="submit" class="btn btn-success w-100 mb-3">Создать аккаунт</button>

      <div class="text-center">
        <span>Уже есть аккаунт?</span>
        <a href="login.html" class="text-success text-decoration-none">Войти</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
