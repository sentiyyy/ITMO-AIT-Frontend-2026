<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финанас - Вход</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 400px; border-radius: 15px;">
        <div class="text-center mb-6">
            <div class="d-flex justify-content-center align-items-center mb-2">
                <img src="img/logo.png" alt="Логотип Финанас" width="45" class="me-2">
                <h1 class="text-success fw-bold mb-0">Финанас</h1>
                    </div>
            <p class="text-muted">Управляй бюджетом со вкусом</p>
        </div>

        <form>
            <div class="mb-3">
                <label for="emailInput" class="form-label">Email</label>
                <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label for="passwordInput" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberCheck">
                <label class="form-check-label" for="rememberCheck">Запомнить меня</label>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-3">Войти</button>

            <div class="text-center">
                <span>Нет аккаунта?</span>
                <a href="register.html" class="text-success text-decoration-none">Зарегистрироваться</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
