<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | MLShare</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <main class="d-flex justify-content-center align-items-center min-vh-100" id="registerMain">
        
        <div class="card border-3 rounded-4 auth-card auth-card-register" id="registerCard">
            <div class="card-body p-4 p-sm-5">
                
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold text-primary mb-1">Регистрация</h1>
                </div>

                <form id="registerForm" action="index.html">
                    <div class="row g-3 mb-3">
                        <div class="col-12 col-sm-6">
                            <label for="firstName" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Иван" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label for="lastName" class="form-label">Фамилия</label>
                            <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Иванов" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Никнейм (Username)</label>
                        <div class="input-group">
                            <span class="input-group-text" id="username-addon">@</span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="ivan_data" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="emailReg" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="emailReg" name="email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="passwordReg" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="passwordReg" name="password" placeholder="Минимум 8 символов" required>
                        <div class="form-text">Используйте буквы, цифры и спец. символы.</div>
                    </div>

                    <div class="mb-4">
                        <label for="passwordConfirm" class="form-label">Повторите пароль</label>
                        <input type="password" class="form-control" id="passwordConfirm" name="passwordConfirm" data-match-target="passwordReg" required>
                    </div>

                    <button type="submit" class="btn bg-primary text-white w-100" id="registerSubmitButton">Создать аккаунт</button>

                    <div class="text-center small text-muted">
                        Уже есть аккаунт? <a href="login.html" class="text-decoration-none fw-bold" id="goToLoginLink">Войти</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
