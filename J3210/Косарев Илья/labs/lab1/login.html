<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | MLShare</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <main class="d-flex justify-content-center align-items-center vh-100" id="loginMain">
        
        <div class="card border-3 rounded-4 auth-card auth-card-login" id="loginCard">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <h1 class="display-5 fw-bold text-primary mb-1">MLShare</h1>
                </div>

                <form id="loginForm" action="index.html" method="post">
                    <div class="mb-2">
                        <label for="emailInput" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="emailInput" name="email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-2">
                        <label for="passwordInput" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="passwordInput" name="password" placeholder="Введите пароль" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe" value="1">
                            <label class="form-check-label small text-muted" for="rememberMe">Запомнить меня</label>
                        </div>
                        <a href="#" class="text-decoration-none small" id="forgotPasswordLink">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn bg-primary text-white w-100 py-2 mb-3" id="loginSubmitButton">Войти</button>

                    <div class="text-center small text-muted">
                        Нет аккаунта? <a href="register.html" class="text-decoration-none fw-bold" id="goToRegisterLink">Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
