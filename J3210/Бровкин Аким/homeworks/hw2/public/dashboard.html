<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-4" aria-label="Главная навигация">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">EduPlatform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html" aria-current="page">Мои курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Поиск курсов</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3" id="userName">...</span>
                    <a href="#" class="btn btn-outline-light btn-sm" id="logoutBtn" role="button">Выйти</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2 class="mb-4">Личный кабинет</h2>
        <div class="row" id="courseListRow">
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const localUser = JSON.parse(localStorage.getItem('user'));
            if (!localUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userName').textContent = localUser.fullName;

            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });

            try {
                const userRes = await fetch(`http://localhost:3000/users/${localUser.id}`);
                const userData = await userRes.json();

                const coursesRes = await fetch('http://localhost:3000/courses');
                const allCourses = await coursesRes.json();

                const courseListRow = document.getElementById('courseListRow');
                courseListRow.innerHTML = '';

                const userCourses = userData.myCourses || [];
                const enrolledCourses = allCourses.filter(course => userCourses.includes(course.id));
                
                enrolledCourses.forEach(course => {
                    const cardHtml = `
                        <div class="col-md-6 mb-4">
                            <article class="edu-card course-card p-3 h-100 d-flex flex-column">
                                <h5 class="card-title">${course.title}</h5>
                                <p class="card-text text-muted">${course.description}</p>
                                <div class="progress mb-3" style="height: 20px;" aria-label="Прогресс курса: ${course.title}">
                                    <div class="progress-bar bg-success" role="progressbar" aria-valuenow="${course.progress}" aria-valuemin="0" aria-valuemax="100" style="width: ${course.progress}%;">${course.progress}%</div>
                                </div>
                                <div class="mt-auto">
                                    <button type="button" class="btn-brand btn-sm" aria-label="Продолжить обучение: ${course.title}">Продолжить обучение</button>
                                </div>
                            </article>
                        </div>
                    `;
                    courseListRow.insertAdjacentHTML('beforeend', cardHtml);
                });

                const findMoreCard = `
                    <div class="col-md-6 mb-4">
                        <div class="edu-card course-card p-3 border rounded text-center d-flex flex-column justify-content-center h-100" style="border-style: dashed !important; background: transparent;">
                            <p class="text-muted">Хотите изучить что-то новое?</p>
                            <a href="search.html" class="btn btn-outline-primary">Найти новый курс</a>
                        </div>
                    </div>
                `;
                courseListRow.insertAdjacentHTML('beforeend', findMoreCard);

            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        });
    </script>
</body>
</html>
