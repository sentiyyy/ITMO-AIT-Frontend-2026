<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Образовательная платформа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <main class="auth-wrapper">
        <div class="theme-toggle-wrapper-auth">
            <button id="themeToggle" class="theme-toggle-btn" aria-label="Переключить тему">
                <svg class="icon"><use href="sprite.svg#icon-theme"></use></svg>
            </button>
        </div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="auth-card p-4 shadow">
                        <h2 class="text-center mb-4">Регистрация</h2>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Имя и Фамилия</label>
                                <input type="text" id="fullName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn-brand w-100">
                                <svg class="icon me-2"><use href="sprite.svg#icon-user"></use></svg>Создать аккаунт
                            </button>
                        </form>
                        <p class="text-center mt-3">
                            Уже есть аккаунт? <a href="index.html">Войти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const checkRes = await fetch(`http://localhost:3000/users?email=${email}`);
                const existingUsers = await checkRes.json();

                if (existingUsers.length > 0) {
                    alert('Пользователь с таким email уже существует!');
                    return;
                }

                const newUser = {
                    fullName: fullName,
                    email: email,
                    password: password,
                    myCourses: []
                };

                await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newUser)
                });

                const getRes = await fetch(`http://localhost:3000/users?email=${email}`);
                const users = await getRes.json();

                localStorage.setItem('user', JSON.stringify(users[0]));
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при регистрации.');
            }
        });

        document.getElementById('themeToggle').addEventListener('click', function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
