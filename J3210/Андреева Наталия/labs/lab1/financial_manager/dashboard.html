<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-3 mb-4 rounded-bottom shadow-sm">
    <a class="navbar-brand fw-bold">MyWallet</a>
    <div class="d-flex align-items-center">
        <span id="userNameDisplay" class="text-white me-3 d-none d-sm-inline"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="container">
    <div class="row g-3">
        <div class="col-12 col-md-4">
            <div class="card p-4 h-100">
                <h5 class="text-muted small text-uppercase fw-bold">Мои счета</h5>
                <h2 id="accBalance" class="mb-0">0 ₽</h2>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card p-4 h-100">
                <h5 class="text-muted small text-uppercase fw-bold">Бюджет на месяц</h5>
                <div class="progress mb-2 mt-2" style="height: 12px; border-radius: 10px;">
                    <div class="progress-bar bg-success" id="budgetBar" style="width: 0%"></div>
                </div>
                <small id="budgetStatus" class="text-muted">0 из 50 000 ₽</small>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <button class="btn btn-primary w-100 h-100 py-3 shadow-sm border-0 fw-bold" data-bs-toggle="modal" data-bs-target="#addMoneyModal">
                + Добавить транзакцию
            </button>
        </div>
    </div>

    <div class="card p-4 mt-4 mb-5 shadow-sm border-0">
        <h5 class="mb-3 fw-bold">Последние транзакции</h5>
        <ul class="list-group list-group-flush" id="recentTrans">
        </ul>
        <a href="search.html" class="btn btn-outline-primary w-100 mt-3 border-2 fw-bold">
            Перейти к детальному поиску
        </a>
    </div>
</div>

<div class="modal fade" id="addMoneyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-body p-4">
                <h5 class="mb-4 fw-bold">Новая операция</h5>

                <label class="small text-muted mb-1">Тип операции</label>
                <select id="typeInput" class="form-select mb-3">
                    <option value="plus">Доход (+)</option>
                    <option value="minus">Расход (-)</option>
                </select>

                <label class="small text-muted mb-1">Категория</label>
                <input type="text" id="catInput" class="form-control mb-3" placeholder="Напр: Продукты">

                <label class="small text-muted mb-1">Дата</label>
                <input type="date" id="dateInput" class="form-control mb-3">

                <label class="small text-muted mb-1">Сумма</label>
                <input type="number" id="sumInput" class="form-control mb-4" placeholder="0.00">

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">Отмена</button>
                    <button id="saveBtn" class="btn btn-success w-100 fw-bold">Сохранить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

<script>
    if (!localStorage.getItem('isLoggedIn')) {
        window.location.href = 'index.html';
    }

    const fullName = localStorage.getItem('userFullName');
    if (fullName && document.getElementById('userNameDisplay')) {
        document.getElementById('userNameDisplay').innerText = fullName;
    }
</script>
</body>
</html>
